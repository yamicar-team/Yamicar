<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yamiCar 客戶問卷 - 匯豐協新租車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rating-input:checked + label {
            background-color: #0891b2 !important;
            color: white !important;
            border-color: #0891b2 !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-xl mx-auto p-4 pb-12">
        <header class="text-center mb-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="max-w-[240px] mx-auto mb-4">
                <img src="yamiCar-logo.png" alt="yamiCar 匯豐協新租車" class="w-full h-auto">
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">短租車客戶問卷</h1>
            <p class="mt-2 text-slate-500 text-sm">感謝您的回饋，協助我們提供更優質的服務</p>
        </header>

        <form id="survey-form" class="space-y-6">
            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">一、基本資料</h2>
                <div class="space-y-5 text-sm">
                    <div>
                        <p class="mb-3 font-medium text-slate-700">1. 年齡</p>
                        <div class="flex flex-wrap gap-2">
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="18-25" class="mr-2" required> 18-25</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="26-35" class="mr-2"> 26-35</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="36-45" class="mr-2"> 36-45</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="46-55" class="mr-2"> 46-55</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="56+" class="mr-2"> 56以上</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="mb-2 font-medium">2. 性別</p>
                            <div class="flex gap-4">
                                <label><input type="radio" name="gender" value="男" required> 男</label>
                                <label><input type="radio" name="gender" value="女"> 女</label>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 font-medium">4. 首次租車？</p>
                            <div class="flex gap-4">
                                <label><input type="radio" name="first_time" value="是" required> 是</label>
                                <label><input type="radio" name="first_time" value="否"> 否</label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p class="mb-2 font-medium">3. 職業</p>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="p-2 border rounded-lg"><input type="radio" name="job" value="學生" required> 學生</label>
                            <label class="p-2 border rounded-lg"><input type="radio" name="job" value="上班族"> 上班族</label>
                            <label class="p-2 border rounded-lg"><input type="radio" name="job" value="自營"> 自營</label>
                            <label class="p-2 border rounded-lg"><input type="radio" name="job" value="其他"> 其他</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">二、租車資訊</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <p class="mb-2 font-medium">1. 租車用途 (可複選)</p>
                        <div class="grid grid-cols-2 gap-2">
                            <label><input type="checkbox" name="purpose" value="旅遊"> 旅遊</label>
                            <label><input type="checkbox" name="purpose" value="通勤"> 通勤</label>
                            <label><input type="checkbox" name="purpose" value="商務"> 商務</label>
                            <label><input type="checkbox" name="purpose" value="體驗試乘"> 體驗試乘</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <label>2. 租用天數<select name="days" class="w-full mt-1 bg-slate-50 border rounded-lg p-2"><option>1天</option><option>2-3天</option><option>4-7天</option><option>7天以上</option></select></label>
                        <label>3. 得知管道<select name="source" class="w-full mt-1 bg-slate-50 border rounded-lg p-2"><option>網路搜尋</option><option>社群媒體</option><option>親友推薦</option><option>門市</option><option>其他</option></select></label>
                    </div>
                </div>
            </section>

            <div id="dynamic-sections"></div>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">五、整體滿意度</h2>
                <div class="space-y-6 text-sm">
                    <div>
                        <p class="mb-4 font-medium">1. 整體滿意度</p>
                        <div class="grid grid-cols-5 gap-1 text-[10px] text-center">
                            <label><input type="radio" name="overall" value="非常不滿意" class="block mx-auto mb-2 w-5 h-5" required>非常不滿意</label>
                            <label><input type="radio" name="overall" value="不滿意" class="block mx-auto mb-2 w-5 h-5">不滿意</label>
                            <label><input type="radio" name="overall" value="普通" class="block mx-auto mb-2 w-5 h-5">普通</label>
                            <label><input type="radio" name="overall" value="滿意" class="block mx-auto mb-2 w-5 h-5">滿意</label>
                            <label><input type="radio" name="overall" value="非常滿意" class="block mx-auto mb-2 w-5 h-5">非常滿意</label>
                        </div>
                    </div>
                    <div class="space-y-4 border-t pt-4">
                        <p class="font-medium">2. 是否願意再次租用？</p>
                        <div class="flex gap-4"><label><input type="radio" name="again" value="會" required> 會</label><label><input type="radio" name="again" value="視情況"> 視情況</label><label><input type="radio" name="again" value="不會"> 不會</label></div>
                        <p class="font-medium">3. 是否願意推薦？</p>
                        <div class="flex gap-4"><label><input type="radio" name="recommend" value="會" required> 會</label><label><input type="radio" name="recommend" value="不確定"> 不確定</label><label><input type="radio" name="recommend" value="不會"> 不會</label></div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm text-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">六、開放性問題</h2>
                <div class="space-y-4">
                    <label class="block">1. 最滿意的地方：<textarea name="good" rows="2" class="w-full mt-1 border rounded-xl p-3 bg-slate-50"></textarea></label>
                    <label class="block">2. 需改進的地方：<textarea name="bad" rows="2" class="w-full mt-1 border rounded-xl p-3 bg-slate-50"></textarea></label>
                    <label class="block">3. 其他建議：<input type="text" name="others" class="w-full mt-1 border rounded-xl p-3 bg-slate-50"></label>
                </div>
            </section>

            <button type="submit" id="submit-btn" class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">送出問卷回饋</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzrnIm5_0i8udeEdNut1fHiQtIZHGWdvNHhBLM9Y2NnCBXhLkceXfIFVbPrQWclL0NQ7g/exec';
        
        // 生成評分項次 (三與四)
        const sections = [
            { id: "三、車輛使用體驗", prefix: "car", items: ["外觀設計", "乘坐舒適度", "動力表現", "煞車安全性", "車廂空間", "油耗表現", "科技配備", "整體車況"] },
            { id: "四、租賃服務評價", prefix: "svc", items: ["租車流程便利性", "門市服務態度", "價格合理性", "交車/還車流程", "說明清楚程度"] }
        ];
        const dynamicBox = document.getElementById('dynamic-sections');
        sections.forEach(sec => {
            let html = `<section class="bg-white p-6 rounded-3xl shadow-sm mb-6"><h2 class="text-lg font-bold mb-1 text-cyan-700 border-b pb-2">${sec.id}</h2><p class="text-[10px] text-slate-400 mb-4">(1分=非常不滿意, 5分=非常滿意)</p><div class="space-y-6">`;
            sec.items.forEach((text, i) => {
                const name = `${sec.prefix}_${i+1}`;
                html += `<div><p class="text-sm font-medium mb-3 text-slate-700">${i+1}. ${text}</p><div class="flex justify-between max-w-xs mx-auto">`;
                for(let n=1; n<=5; n++) {
                    html += `<input type="radio" name="${name}" id="${name}_${n}" value="${n}" class="hidden rating-input" required><label for="${name}_${n}" class="w-10 h-10 flex items-center justify-center border-2 border-slate-100 rounded-xl bg-slate-50 font-bold cursor-pointer transition">${n}</label>`;
                }
                html += `</div></div>`;
            });
            html += `</div></section>`;
            dynamicBox.innerHTML += html;
        });

        // 提交邏輯
        const form = document.getElementById('survey-form');
        const btn = document.getElementById('submit-btn');
        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "正在傳送...";
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    alert("感謝您的回饋！");
                    btn.innerText = "送出成功";
                    btn.classList.replace('bg-cyan-600', 'bg-green-600');
                    form.reset();
                })
                .catch(() => {
                    alert("傳送失敗，請確認網路或 GAS 設定。");
                    btn.disabled = false;
                    btn.innerText = "重新送出";
                });
        });
    </script>
</body>
</html>
