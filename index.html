<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yamiCar 客戶問卷 - 匯豐協新租車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rating-input:checked + label {
            background-color: #0891b2 !important;
            color: white !important;
            border-color: #0891b2 !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-xl mx-auto p-4 pb-12">
        <header class="text-center mb-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="max-w-[240px] mx-auto mb-4">
                <img src="yamiCar-logo.png" alt="yamiCar 匯豐協新租車" class="w-full h-auto">
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">短租車客戶問卷</h1>
            <p class="mt-2 text-slate-500 text-sm">您的寶貴意見將協助我們提供更好的服務</p>
        </header>

        <form id="survey-form" class="space-y-6">
            
            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">一、基本資料</h2>
                <div class="space-y-5 text-sm">
                    <div>
                        <p class="mb-3 font-medium">1. 年齡</p>
                        <div class="flex flex-wrap gap-2">
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="18-25" class="mr-2" required> 18-25</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="26-35" class="mr-2"> 26-35</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="36-45" class="mr-2"> 36-45</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="46-55" class="mr-2"> 46-55</label>
                            <label class="flex items-center px-3 py-2 bg-slate-50 rounded-full border border-slate-200 cursor-pointer"><input type="radio" name="age" value="56+" class="mr-2"> 56以上</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="mb-2 font-medium">2. 性別</p>
                            <div class="flex gap-4">
                                <label class="flex items-center"><input type="radio" name="gender" value="男" class="mr-1" required> 男</label>
                                <label class="flex items-center"><input type="radio" name="gender" value="女" class="mr-1"> 女</label>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 font-medium">4. 首次租車？</p>
                            <div class="flex gap-4">
                                <label class="flex items-center"><input type="radio" name="first_time" value="是" class="mr-1" required> 是</label>
                                <label class="flex items-center"><input type="radio" name="first_time" value="否" class="mr-1"> 否</label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p class="mb-2 font-medium">3. 職業</p>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center p-2 border border-slate-200 rounded-lg"><input type="radio" name="job" value="學生" class="mr-2" required> 學生</label>
                            <label class="flex items-center p-2 border border-slate-200 rounded-lg"><input type="radio" name="job" value="上班族" class="mr-2"> 上班族</label>
                            <label class="flex items-center p-2 border border-slate-200 rounded-lg"><input type="radio" name="job" value="自營" class="mr-2"> 自營</label>
                            <label class="flex items-center p-2 border border-slate-200 rounded-lg"><input type="radio" name="job" value="其他" class="mr-2"> 其他</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">二、租車資訊</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <p class="mb-2 font-medium">1. 租車用途 (可複選)</p>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="旅遊" class="mr-2"> 旅遊</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="通勤" class="mr-2"> 通勤</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="商務" class="mr-2"> 商務</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="體驗試乘" class="mr-2"> 體驗試乘</label>
                        </div>
                    </div>
                    <div>
                        <p class="mb-1 font-medium">2. 租用天數</p>
                        <select name="days" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 outline-none">
                            <option value="1天">1天</option><option value="2-3天">2-3天</option><option value="4-7天">4-7天</option><option value="7天以上">7天以上</option>
                        </select>
                    </div>
                    <div>
                        <p class="mb-1 font-medium">3. 得知管道</p>
                        <select name="source" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 outline-none">
                            <option value="網路搜尋">網路搜尋</option><option value="社群媒體">社群媒體</option><option value="親友推薦">親友推薦</option><option value="門市">門市</option><option value="其他">其他</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-1 text-cyan-700 border-b pb-2">三、車輛使用體驗</h2>
                <p class="text-[10px] text-slate-400 mb-4">(1分=非常不滿意，5分=非常滿意)</p>
                <div class="space-y-6">
                    <script>
                        const carItems = [
                            {label: "外觀設計", name: "car_1"}, {label: "乘坐舒適度", name: "car_2"},
                            {label: "動力表現", name: "car_3"}, {label: "煞車安全性", name: "car_4"},
                            {label: "車廂空間", name: "car_5"}, {label: "油耗表現", name: "car_6"},
                            {label: "科技配備", name: "car_7"}, {label: "整體車況", name: "car_8"}
                        ];
                        carItems.forEach((item, idx) => {
                            document.write(`
                                <div>
                                    <p class="text-sm font-medium mb-3">${idx+1}. ${item.label}</p>
                                    <div class="flex justify-between max-w-xs mx-auto">
                                        ${[1,2,3,4,5].map(n => `
                                            <input type="radio" name="${item.name}" id="${item.name}_${n}" value="${n}" class="hidden rating-input" required>
                                            <label for="${item.name}_${n}" class="w-10 h-10 flex items-center justify-center border-2 border-slate-100 rounded-xl bg-slate-50 font-bold">${n}</label>
                                        `).join('')}
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-1 text-cyan-700 border-b pb-2">四、租賃服務評價</h2>
                <p class="text-[10px] text-slate-400 mb-4">(1分=非常不滿意，5分=非常滿意)</p>
                <div class="space-y-6">
                    <script>
                        const svcItems = [
                            {label: "租車流程便利性", name: "svc_1"}, {label: "門市服務態度", name: "svc_2"},
                            {label: "價格合理性", name: "svc_3"}, {label: "交車/還車流程", name: "svc_4"},
                            {label: "說明清楚程度", name: "svc_5"}
                        ];
                        svcItems.forEach((item, idx) => {
                            document.write(`
                                <div>
                                    <p class="text-sm font-medium mb-3">${idx+1}. ${item.label}</p>
                                    <div class="flex justify-between max-w-xs mx-auto">
                                        ${[1,2,3,4,5].map(n => `
                                            <input type="radio" name="${item.name}" id="${item.name}_${n}" value="${n}" class="hidden rating-input" required>
                                            <label for="${item.name}_${n}" class="w-10 h-10 flex items-center justify-center border-2 border-slate-100 rounded-xl bg-slate-50 font-bold">${n}</label>
                                        `).join('')}
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">五、整體滿意度</h2>
                <div class="space-y-6 text-sm">
                    <div>
                        <p class="mb-4 font-medium">1. 整體滿意度</p>
                        <div class="grid grid-cols-5 gap-1 text-[10px] text-center">
                            <label><input type="radio" name="overall" value="非常不滿意" class="block mx-auto mb-2 w-5 h-5" required><br>非常不滿意</label>
                            <label><input type="radio" name="overall" value="不滿意" class="block mx-auto mb-2 w-5 h-5"><br>不滿意</label>
                            <label><input type="radio" name="overall" value="普通" class="block mx-auto mb-2 w-5 h-5"><br>普通</label>
                            <label><input type="radio" name="overall" value="滿意" class="block mx-auto mb-2 w-5 h-5"><br>滿意</label>
                            <label><input type="radio" name="overall" value="非常滿意" class="block mx-auto mb-2 w-5 h-5"><br>非常滿意</label>
                        </div>
                    </div>
                    <div class="space-y-4 border-t pt-4">
                        <div>
                            <p class="mb-2 font-medium">2. 是否願意再次租用？</p>
                            <div class="flex gap-6">
                                <label><input type="radio" name="again" value="會" class="mr-2" required> 會</label>
                                <label><input type="radio" name="again" value="視情況" class="mr-2"> 視情況</label>
                                <label><input type="radio" name="again" value="不會" class="mr-2"> 不會</label>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 font-medium">3. 是否願意推薦？</p>
                            <div class="flex gap-6">
                                <label><input type="radio" name="recommend" value="會" class="mr-2" required> 會</label>
                                <label><input type="radio" name="recommend" value="不確定" class="mr-2"> 不確定</label>
                                <label><input type="radio" name="recommend" value="不會" class="mr-2"> 不會</label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">六、開放性問題</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block font-medium mb-2">1. 最滿意的地方：</label>
                        <textarea name="good" rows="2" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:ring-1 focus:ring-cyan-500" placeholder="請輸入內容..."></textarea>
                    </div>
                    <div>
                        <label class="block font-medium mb-2">2. 需改進的地方：</label>
                        <textarea name="bad" rows="2" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:ring-1 focus:ring-cyan-500" placeholder="請輸入內容..."></textarea>
                    </div>
                    <div>
                        <label class="block font-medium mb-2">3. 其他建議：</label>
                        <input type="text" name="others" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:ring-1 focus:ring-cyan-500" placeholder="請輸入內容...">
                    </div>
                </div>
            </section>

            <button type="submit" id="submit-btn" class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-cyan-700 transition transform active:scale-95 text-lg">
                送出問卷回饋
            </button>
        </form>

        <footer class="mt-8 text-center text-slate-400 text-[10px]">
            © 2024 yamiCar 匯豐協新租車 版權所有
        </footer>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxq_uB836nlHEmuglQ-c3ezqixqg9WYvjirvxvI595NTBVUjp8F0lKSaG_XNmXiRTA_Mg/exec';
        const form = document.getElementById('survey-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "正在傳送資料...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("感謝您的回饋！yamiCar 已成功收到您的問卷。");
                    btn.innerText = "問卷已送出";
                    btn.classList.replace('bg-cyan-600', 'bg-green-600');
                    form.reset();
                })
                .catch(error => {
                    alert("傳送失敗，請檢查網路連線或確定 GAS 網址是否正確。");
                    btn.disabled = false;
                    btn.innerText = "重新送出回饋";
                });
        });
    </script>
</body>
</html>
