<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yamiCar 客戶問卷 - 匯豐協新租車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rating-input:checked + label {
            background-color: #0891b2;
            color: white;
            border-color: #0891b2;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-xl mx-auto p-4 pb-12">
        <header class="text-center mb-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="max-w-[240px] mx-auto mb-4">
                <img src="yamiCar-logo.png" alt="yamiCar 匯豐協新租車" class="w-full h-auto">
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">短租車客戶問卷</h1>
            <p class="mt-2 text-slate-500 text-sm">您的寶貴意見將協助我們提供更好的服務</p>
        </header>

        <form action="#" method="POST" class="space-y-6">
            
            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">一、基本資料</h2>
                <div class="space-y-5">
                    <div>
                        <p class="mb-3 font-medium text-sm">1. 年齡</p>
                        <div class="flex flex-wrap gap-2">
                            <label class="flex items-center px-4 py-2 bg-slate-50 rounded-full border text-sm cursor-pointer hover:bg-slate-100"><input type="radio" name="age" value="18-25" class="mr-2"> 18-25</label>
                            <label class="flex items-center px-4 py-2 bg-slate-50 rounded-full border text-sm cursor-pointer hover:bg-slate-100"><input type="radio" name="age" value="26-35" class="mr-2"> 26-35</label>
                            <label class="flex items-center px-4 py-2 bg-slate-50 rounded-full border text-sm cursor-pointer hover:bg-slate-100"><input type="radio" name="age" value="36-45" class="mr-2"> 36-45</label>
                            <label class="flex items-center px-4 py-2 bg-slate-50 rounded-full border text-sm cursor-pointer hover:bg-slate-100"><input type="radio" name="age" value="46-55" class="mr-2"> 46-55</label>
                            <label class="flex items-center px-4 py-2 bg-slate-50 rounded-full border text-sm cursor-pointer hover:bg-slate-100"><input type="radio" name="age" value="56+" class="mr-2"> 56以上</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="mb-2 font-medium text-sm">2. 性別</p>
                            <div class="flex gap-4">
                                <label class="flex items-center"><input type="radio" name="gender" value="男" class="mr-1"> 男</label>
                                <label class="flex items-center"><input type="radio" name="gender" value="女" class="mr-1"> 女</label>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 font-medium text-sm">4. 首次租車？</p>
                            <div class="flex gap-4">
                                <label class="flex items-center"><input type="radio" name="first_time" value="是" class="mr-1"> 是</label>
                                <label class="flex items-center"><input type="radio" name="first_time" value="否" class="mr-1"> 否</label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p class="mb-2 font-medium text-sm">3. 職業</p>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center p-2 border rounded-lg"><input type="radio" name="job" value="學生" class="mr-2"> 學生</label>
                            <label class="flex items-center p-2 border rounded-lg"><input type="radio" name="job" value="上班族" class="mr-2"> 上班族</label>
                            <label class="flex items-center p-2 border rounded-lg"><input type="radio" name="job" value="自營" class="mr-2"> 自營</label>
                            <label class="flex items-center p-2 border rounded-lg"><input type="radio" name="job" value="其他" class="mr-2"> 其他</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">二、租車資訊</h2>
                <div class="space-y-4 text-sm">
                    <div>
                        <p class="mb-2 font-medium">1. 租車用途 (可複選)</p>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="旅遊" class="mr-2"> 旅遊</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="通勤" class="mr-2"> 通勤</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="商務" class="mr-2"> 商務</label>
                            <label class="flex items-center"><input type="checkbox" name="purpose" value="體驗試乘" class="mr-2"> 體驗試乘</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 pt-2">
                        <div>
                            <p class="mb-1 font-medium">2. 租用天數</p>
                            <select name="days" class="w-full bg-slate-50 border rounded-lg p-2">
                                <option>1天</option><option>2-3天</option><option>4-7天</option><option>7天以上</option>
                            </select>
                        </div>
                        <div>
                            <p class="mb-1 font-medium">3. 得知管道</p>
                            <select name="source" class="w-full bg-slate-50 border rounded-lg p-2">
                                <option>網路搜尋</option><option>社群媒體</option><option>親友推薦</option><option>門市</option><option>其他</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <script>
                const sections = [
                    { title: "三、車輛使用體驗", prefix: "car", items: ["外觀設計", "乘坐舒適度", "動力表現", "煞車安全性", "車廂空間", "油耗表現", "科技配備", "整體車況"] },
                    { title: "四、租賃服務評價", prefix: "svc", items: ["租車流程便利性", "門市服務態度", "價格合理性", "交車/還車流程", "說明清楚程度"] }
                ];
                
                sections.forEach(sec => {
                    document.write(`
                        <section class="bg-white p-6 rounded-3xl shadow-sm">
                            <h2 class="text-lg font-bold mb-1 text-cyan-700 border-b pb-2">${sec.title}</h2>
                            <p class="text-[10px] text-slate-400 mb-4">(1分:非常不滿意 → 5分:非常滿意)</p>
                            <div class="space-y-6">
                                ${sec.items.map((text, i) => `
                                    <div>
                                        <p class="text-sm font-medium mb-2 text-slate-700">${i+1}. ${text}</p>
                                        <div class="flex justify-between items-center max-w-xs mx-auto">
                                            ${[1,2,3,4,5].map(num => `
                                                <input type="radio" name="${sec.prefix}_${i}" id="${sec.prefix}_${i}_${num}" value="${num}" class="hidden rating-input">
                                                <label for="${sec.prefix}_${i}_${num}" class="w-10 h-10 flex items-center justify-center border-2 border-slate-100 rounded-xl cursor-pointer text-sm font-bold transition-all shadow-sm bg-slate-50">${num}</label>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    `);
                });
            </script>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">五、整體滿意度</h2>
                <div class="space-y-6 text-sm">
                    <div>
                        <p class="mb-3 font-medium">1. 整體滿意度</p>
                        <div class="grid grid-cols-5 gap-1 text-[10px] text-center">
                            ${["非常不滿意", "不滿意", "普通", "滿意", "非常滿意"].map((t, i) => `
                                <label><input type="radio" name="overall" value="${i+1}" class="block mx-auto mb-1"> ${t}</label>
                            `).join('')}
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <p class="mb-2 font-medium">2. 是否願意再次租用？</p>
                            <div class="flex gap-4">
                                <label><input type="radio" name="again" value="會"> 會</label>
                                <label><input type="radio" name="again" value="視情況"> 視情況</label>
                                <label><input type="radio" name="again" value="不會"> 不會</label>
                            </div>
                        </div>
                        <div>
                            <p class="mb-2 font-medium">3. 是否願意推薦？</p>
                            <div class="flex gap-4">
                                <label><input type="radio" name="recommend" value="會"> 會</label>
                                <label><input type="radio" name="recommend" value="不確定"> 不確定</label>
                                <label><input type="radio" name="recommend" value="不會"> 不會</label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 text-cyan-700 border-b pb-2">六、開放性問題</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">1. 最滿意的地方：</label>
                        <textarea name="good" rows="2" class="w-full border rounded-xl p-3 bg-slate-50 text-sm" placeholder="請輸入內容..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">2. 需改進的地方：</label>
                        <textarea name="bad" rows="2" class="w-full border rounded-xl p-3 bg-slate-50 text-sm" placeholder="請輸入內容..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">3. 其他建議：</label>
                        <input type="text" name="others" class="w-full border rounded-xl p-3 bg-slate-50 text-sm" placeholder="請輸入內容...">
                    </div>
                </div>
            </section>

            <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-cyan-700 transition transform active:scale-95">
                送出問卷
            </button>
        </form>

        <footer class="mt-8 text-center text-slate-400 text-[10px]">
            © 2024 yamiCar 匯豐協新租車 版權所有
        </footer>
    </div>

</body>
</html>
